<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#fafafa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Arc (sextant body) -->
  <path d="M6 26 A18 18 0 0 1 26 26" />
  <!-- Base line -->
  <line x1="6" y1="26" x2="26" y2="26" />
  <!-- Index arm (pivoting from top) -->
  <line x1="16" y1="4" x2="16" y2="26" />
  <!-- Angled sight line -->
  <line x1="16" y1="4" x2="26" y2="26" />
  <!-- Telescope/sight -->
  <line x1="16" y1="4" x2="8" y2="10" />
  <!-- Pivot point -->
  <circle cx="16" cy="26" r="1.5" fill="#fafafa" stroke="none" />
  <!-- Scale marks on arc -->
  <line x1="6.5" y1="25" x2="7.5" y2="23.5" />
  <line x1="10" y1="21.5" x2="11.2" y2="20.3" />
  <line x1="15" y1="19.5" x2="16" y2="18.2" />
  <line x1="20.5" y1="20" x2="21.5" y2="18.8" />
  <line x1="24.5" y1="23" x2="25.2" y2="21.5" />
</svg>
