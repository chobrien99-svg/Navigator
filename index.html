<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Navigator — French Innovation Intelligence System</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 720px;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .subhead {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 600;
      color: #a1a1aa;
      letter-spacing: -0.01em;
      margin-bottom: 2rem;
    }

    .description {
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      line-height: 1.7;
      color: #71717a;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>The Navigator</h1>
    <p class="subhead">The French Innovation Intelligence System</p>
    <p class="description">
      A unified intelligence platform covering companies, capital, research, talent, and public institutions across France with a global view of French innovation. Built for institutional decision-makers who require depth over noise.
    </p>
  </div>
</body>
</html>
